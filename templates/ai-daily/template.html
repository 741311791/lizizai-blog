<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 日报模板</title>
  <!-- 字体预连接 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;700;900&family=Instrument+Sans:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- 主题样式 -->
  <link rel="stylesheet" href="https://pub-7fc5ed7acc9844ab99297fa6b47f55e6.r2.dev/themes/lizizai-blog-theme.css">
  <style>
    /* ============================
       AI 日报模板 — Editorial Flow
       统一宽度版
       ============================ */

    /* --- 全局 --- */
    body {
      background: var(--color-background);
      color: var(--color-text-secondary);
      font-family: var(--font-body), var(--font-body-en), sans-serif;
      font-size: 17px;
      line-height: 1.8;
      margin: 0;
      padding: 0;
    }

    /* --- 统一容器宽度 --- */
    .daily-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 var(--space-md);
    }

    /* --- 日期头部 --- */
    .daily-header {
      text-align: center;
      padding: var(--space-xl) 0 var(--space-lg);
      border-bottom: 1px solid var(--color-border);
      margin-bottom: var(--space-xl);
    }
    .daily-header__date {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--color-text-muted);
      letter-spacing: 0.05em;
      margin-bottom: var(--space-xs);
    }
    .daily-header__title {
      font-family: var(--font-title);
      font-size: 28px;
      font-weight: 900;
      color: var(--color-text-primary);
      line-height: 1.35;
      margin: 0 0 var(--space-sm);
    }
    .daily-header__subtitle {
      font-size: 15px;
      color: var(--color-text-muted);
      margin: 0;
    }

    /* --- 板块标题 --- */
    .section-title {
      font-family: var(--font-title);
      font-size: 24px;
      font-weight: 700;
      color: var(--color-text-primary);
      line-height: 1.4;
      margin: var(--space-2xl) 0 var(--space-md);
      padding-bottom: var(--space-sm);
      border-bottom: 2px solid var(--color-primary);
      display: inline-block;
    }
    .section-title:first-child {
      margin-top: 0;
    }
    /* 板块摘要 */
    .section-summary {
      font-size: 15px;
      color: var(--color-text-muted);
      margin-bottom: var(--space-lg);
      padding-left: var(--space-md);
      border-left: 2px solid var(--color-border);
    }
    /* 信息源 */
    .section-source {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: var(--space-md);
      font-style: italic;
    }
    .section-source::before {
      content: '信息源：';
      font-style: normal;
      color: var(--color-text-muted);
    }

    /* --- 今日概览 --- */
    .overview-box {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      margin: var(--space-lg) 0;
    }
    .overview-box__label {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-primary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--space-sm);
    }
    .overview-box__text {
      font-size: 15px;
      color: var(--color-text-secondary);
      line-height: 1.75;
      margin: 0 0 var(--space-md);
    }
    .overview-box__text:last-child {
      margin-bottom: 0;
    }
    .overview-box__text strong {
      color: var(--color-text-primary);
      font-weight: 600;
    }

    /* --- 关键词标签 --- */
    .keyword-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      margin: var(--space-md) 0;
    }
    .keyword-tags__label {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-muted);
      align-self: center;
      margin-right: var(--space-2xs);
    }
    .keyword-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-primary);
      background: rgba(217, 119, 6, 0.1);
      border: 1px solid rgba(217, 119, 6, 0.2);
      border-radius: 9999px;
      padding: 2px 10px;
    }

    /* --- 新闻条目 --- */
    .news-item {
      margin-bottom: var(--space-xl);
      padding-bottom: var(--space-xl);
      border-bottom: 1px solid var(--color-border);
    }
    .news-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .news-item__title {
      font-family: var(--font-title);
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text-primary);
      line-height: 1.4;
      margin: 0 0 var(--space-sm);
    }
    .news-item__title a {
      color: var(--color-text-primary);
      text-decoration: none;
    }
    .news-item__title a:hover {
      color: var(--color-primary);
      text-decoration: underline;
    }
    .news-item__source {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-muted);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 9999px;
      padding: 2px 8px;
      margin-bottom: var(--space-sm);
    }
    .news-item__source::before {
      content: '来源：';
    }
    .news-item__points {
      margin: var(--space-sm) 0;
      padding-left: var(--space-md);
      border-left: 3px solid var(--color-primary);
    }
    .news-item__points-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: 4px;
    }
    .news-item__points p {
      margin: 0;
      font-size: 16px;
      line-height: 1.75;
    }
    .news-item__analysis {
      margin: var(--space-sm) 0 0;
      padding: var(--space-md);
      background: var(--color-surface);
      border-radius: var(--radius-md);
      font-size: 15px;
      line-height: 1.75;
    }
    .news-item__analysis::before {
      content: '解读';
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: 4px;
    }

    /* --- 开源项目 --- */
    .oss-highlight {
      background: rgba(217, 119, 6, 0.06);
      border: 1px solid rgba(217, 119, 6, 0.15);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-lg);
      font-size: 15px;
      line-height: 1.7;
    }
    .oss-highlight::before {
      content: '重点关注';
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: var(--space-xs);
    }
    .oss-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      margin-bottom: var(--space-md);
      transition: border-color 0.2s;
    }
    .oss-card:hover {
      border-color: var(--color-border-hover);
    }
    .oss-card__header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: var(--space-xs);
      flex-wrap: wrap;
      gap: var(--space-xs);
    }
    .oss-card__name {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin: 0;
    }
    .oss-card__name a {
      color: var(--color-primary);
      text-decoration: none;
    }
    .oss-card__name a:hover {
      color: var(--color-primary-hover);
      text-decoration: underline;
    }
    .oss-card__stars {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--color-text-muted);
      white-space: nowrap;
    }
    .oss-card__stars em {
      font-style: normal;
      color: var(--color-primary);
      font-weight: 500;
    }
    .oss-card__desc {
      font-size: 15px;
      line-height: 1.7;
      color: var(--color-text-secondary);
      margin: var(--space-sm) 0;
    }
    .oss-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2xs);
      margin: var(--space-sm) 0;
    }
    .oss-card__tag {
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-muted);
      background: var(--color-surface-elevated);
      border-radius: 9999px;
      padding: 2px 8px;
    }
    .oss-card__value {
      font-size: 14px;
      line-height: 1.7;
      color: var(--color-text-muted);
      margin-top: var(--space-sm);
      padding-top: var(--space-sm);
      border-top: 1px solid var(--color-border);
    }
    .oss-card__value::before {
      content: '独立开发者价值：';
      font-weight: 600;
      color: var(--color-text-secondary);
    }

    /* --- 数据表格 --- */
    .table-wrapper {
      overflow-x: auto;
      margin: var(--space-md) 0;
      -webkit-overflow-scrolling: touch;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      line-height: 1.5;
    }
    .data-table th {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-muted);
      text-align: left;
      padding: var(--space-sm) var(--space-md);
      border-bottom: 2px solid var(--color-border);
      white-space: nowrap;
    }
    .data-table td {
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--color-border);
      vertical-align: top;
    }
    .data-table tr:last-child td {
      border-bottom: none;
    }
    .data-table td:first-child {
      font-weight: 600;
      color: var(--color-text-primary);
      white-space: nowrap;
    }
    .data-table__highlight {
      color: var(--color-primary);
      font-weight: 500;
    }
    /* 融资表格 */
    .data-table .amount {
      font-family: var(--font-mono);
      color: var(--color-primary);
      font-weight: 500;
      font-size: 13px;
      white-space: nowrap;
    }

    /* --- 宏观数据卡片 --- */
    .macro-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--space-md);
      margin: var(--space-lg) 0;
    }
    .macro-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      text-align: center;
    }
    .macro-card__value {
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 700;
      color: var(--color-primary);
      line-height: 1.3;
      margin-bottom: var(--space-2xs);
    }
    .macro-card__metric {
      font-size: 13px;
      color: var(--color-text-muted);
      line-height: 1.4;
    }
    .macro-card__source {
      font-size: 11px;
      color: var(--color-text-muted);
      margin-top: var(--space-2xs);
      opacity: 0.7;
    }

    /* --- 趋势分析 --- */
    .trend-analysis {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-left: 3px solid var(--color-primary);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      padding: var(--space-lg);
      margin: var(--space-lg) 0;
    }
    .trend-analysis p {
      font-size: 15px;
      line-height: 1.75;
      margin: 0 0 var(--space-sm);
    }
    .trend-analysis p:last-child {
      margin-bottom: 0;
    }

    /* --- 观点引用 --- */
    .opinion-item {
      margin-bottom: var(--space-lg);
      padding-left: var(--space-lg);
      border-left: 3px solid var(--color-border);
    }
    .opinion-item__person {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 2px;
    }
    .opinion-item__title {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: var(--space-sm);
    }
    .opinion-item__quote {
      font-size: 16px;
      line-height: 1.75;
      color: var(--color-text-secondary);
      margin: 0 0 var(--space-sm);
      font-style: italic;
    }
    .opinion-item__original {
      font-size: 14px;
      line-height: 1.65;
      color: var(--color-text-muted);
      margin: 0;
      font-style: italic;
    }
    .opinion-item__source {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: var(--space-xs);
    }

    /* --- 研究论文 --- */
    .paper-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      margin-bottom: var(--space-md);
    }
    .paper-card__title {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text-primary);
      line-height: 1.4;
      margin: 0 0 var(--space-xs);
    }
    .paper-card__meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: var(--space-sm);
    }
    .paper-card__meta a {
      color: var(--color-primary);
      text-decoration: none;
    }
    .paper-card__meta a:hover {
      text-decoration: underline;
    }
    .paper-card__abstract {
      font-size: 15px;
      line-height: 1.7;
      color: var(--color-text-secondary);
      margin: var(--space-sm) 0;
    }
    .paper-card__abstract::before {
      content: '摘要：';
      font-weight: 600;
      color: var(--color-text-muted);
    }
    .paper-card__significance {
      font-size: 14px;
      line-height: 1.7;
      color: var(--color-text-muted);
      padding-top: var(--space-sm);
      border-top: 1px solid var(--color-border);
      margin-top: var(--space-sm);
    }
    .paper-card__significance::before {
      content: '意义：';
      font-weight: 600;
      color: var(--color-text-secondary);
    }

    /* --- 厂商动态 --- */
    .company-item {
      margin-bottom: var(--space-md);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--color-border);
    }
    .company-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .company-item__name {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 2px;
    }
    .company-item__update {
      font-size: 15px;
      line-height: 1.7;
      margin: var(--space-2xs) 0;
    }
    .company-item__source {
      font-size: 12px;
      color: var(--color-text-muted);
    }
    .company-item__source::before {
      content: '— ';
    }
    .company-scope {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: var(--space-md);
      padding: var(--space-sm) var(--space-md);
      background: var(--color-surface);
      border-radius: var(--radius-md);
      line-height: 1.6;
    }
    .company-scope::before {
      content: '关注范围：';
      font-weight: 600;
    }

    /* --- 页脚 --- */
    .daily-footer {
      text-align: center;
      padding: var(--space-xl) 0 var(--space-lg);
      margin-top: var(--space-2xl);
      border-top: 1px solid var(--color-border);
      font-size: 13px;
      color: var(--color-text-muted);
      line-height: 1.6;
    }

    /* --- 子板块标签 --- */
    .sub-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin: var(--space-lg) 0 var(--space-sm);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    .sub-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    /* --- 分隔线 --- */
    .divider-line {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: var(--space-xl) 0;
    }
  </style>
</head>

  <!-- JSON 数据（替换此内容即可生成新日报） -->
  <script id="daily-data" type="application/json">
{}
  </script>

  <!-- 渲染引擎 -->
  <script>
  (function() {
    'use strict';

    // 读取数据
    var dataEl = document.getElementById('daily-data');
    var data = JSON.parse(dataEl.textContent);

    // 工具函数
    function esc(s) {
      if (!s) return '';
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function formatNumber(n) {
      // 容错：n 为 undefined/null/非数字时返回空字符串
      if (n === undefined || n === null || n === '') return '';
      return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }
    function sourceLink(source, url) {
      if (!source) return '';
      if (url) {
        return '<a href="' + esc(url) + '" target="_blank" rel="noopener">' + esc(source) + '</a>';
      }
      return esc(source);
    }

    function renderMarkdown(s) {
      if (!s) return '';
      // First escape HTML entities (security), then convert **bold** to <strong>
      var d = document.createElement('div');
      d.textContent = s;
      var escaped = d.innerHTML;
      // Convert **text** to <strong>text</strong>
      return escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }

    // 构建页面 — 统一使用 .daily-container 容器
    var html = '';
    var meta = data.meta || {};

    html += '<div class="daily-container">';

    // ---- 日期头部 ----
    html += '<div class="daily-header">';
    html += '<div class="daily-header__date">' + esc(meta.date || '') + '</div>';
    html += '<h2 class="daily-header__title">' + esc((meta.title || 'AI 日报') + ' | ' + (meta.date || '')) + '</h2>';
    html += '</div>';

    // ---- 今日概览 ----
    var ov = data.overview;
    if (ov) {
      html += '<h3 class="section-title">今日概览</h3>';

      if (ov.boxes && ov.boxes.length) {
        ov.boxes.forEach(function(box) {
          html += '<div class="overview-box">';
          html += '<div class="overview-box__label">' + esc(box.label) + '</div>';
          html += '<p class="overview-box__text">' + esc(box.text) + '</p>';
          html += '</div>';
        });
      }

      if (ov.keywords && ov.keywords.length) {
        html += '<div class="keyword-tags">';
        html += '<span class="keyword-tags__label">关键词：</span>';
        ov.keywords.forEach(function(kw) {
          html += '<span class="keyword-tag">' + esc(kw) + '</span>';
        });
        html += '</div>';
      }
    }

    // ---- 头条聚焦 ----
    if (data.headline) {
      html += '<h3 class="section-title">头条聚焦</h3>';
      if (data.headline.summary) {
        html += '<p>' + esc(data.headline.summary) + '</p>';
      }
      if (data.headline.source) {
        html += '<p class="section-source">' + esc(data.headline.source) + '</p>';
      }
    }

    // ---- 新闻条目（标题可点击） ----
    if (data.news && data.news.length) {
      data.news.forEach(function(item) {
        html += '<div class="news-item">';
        // 标题：有 url 时渲染为链接
        if (item.sourceUrl) {
          html += '<h3 class="news-item__title"><a href="' + esc(item.sourceUrl) + '" target="_blank" rel="noopener">' + esc(item.title) + '</a></h3>';
        } else {
          html += '<h3 class="news-item__title">' + esc(item.title) + '</h3>';
        }
        if (item.source) {
          html += '<span class="news-item__source">' + sourceLink(item.source, item.sourceUrl) + '</span>';
        }
        if (item.keyPoints) {
          html += '<div class="news-item__points">';
          html += '<div class="news-item__points-label">要点</div>';
          html += '<p>' + esc(item.keyPoints) + '</p>';
          html += '</div>';
        }
        if (item.analysis) {
          html += '<div class="news-item__analysis">' + esc(item.analysis) + '</div>';
        }
        html += '</div>';
      });
    }

    // ---- 开源速递 ----
    if (data.openSource) {
      var oss = data.openSource;
      html += '<h3 class="section-title">开源速递</h3>';
      if (oss.source) {
        html += '<p class="section-source">' + esc(oss.source) + '</p>';
      }
      if (oss.summary) {
        html += '<p>' + esc(oss.summary) + '</p>';
      }
      if (oss.highlight) {
        html += '<div class="oss-highlight">' + esc(oss.highlight) + '</div>';
      }
      if (oss.items && oss.items.length) {
        oss.items.forEach(function(item) {
          html += '<div class="oss-card">';
          html += '<div class="oss-card__header">';
          html += '<h4 class="oss-card__name"><a href="' + esc(item.repo) + '" target="_blank" rel="noopener">' + esc(item.name) + '</a></h4>';
          html += '<span class="oss-card__stars">';
          if (item.stars) {
            html += '⭐ ' + formatNumber(item.stars) + (item.starsToday ? ' <em>(+' + formatNumber(item.starsToday) + ')</em>' : '');
          } else if (item.starsToday) {
            // 只有今日增量无总数（如紧凑表格格式的日报）
            html += '📈 今日 +' + formatNumber(item.starsToday);
          } else {
            html += '⭐ —';
          }
          html += '</span>';
          html += '</div>';
          html += '<p class="oss-card__desc">' + esc(item.description) + '</p>';
          if (item.tags && item.tags.length) {
            html += '<div class="oss-card__tags">';

  <!-- postMessage 高度同步 -->
  <script>
  (function() {
    function sendHeight() {
      var h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
      window.parent.postMessage({ type: 'html-content-height', height: h }, '*');
    }
    var timer = null;
    function throttledSend() {
      if (timer) return;
      timer = setTimeout(function() { timer = null; sendHeight(); }, 100);
    }
    new MutationObserver(throttledSend)
      .observe(document.documentElement, { childList: true, subtree: true, attributes: true });
    new ResizeObserver(throttledSend)
      .observe(document.body);
    document.addEventListener('load', function(e) {
      if (e.target.tagName === 'IMG') throttledSend();
    }, true);
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() { setTimeout(sendHeight, 50); });
    } else {
      setTimeout(sendHeight, 50);
    }
    window.addEventListener('load', function() { setTimeout(sendHeight, 100); });
  })();
  </script>

  <!-- HTML 内置目录（浮动按钮 + 抽屉，取代外部 TOC 同步） -->
  <style>
    .lz-toc-fab{position:fixed;right:20px;bottom:20px;z-index:9998;width:44px;height:44px;border-radius:50%;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:color .2s,background .2s,border-color .2s}
    .lz-toc-fab:hover{background:var(--color-surface-elevated);color:var(--color-primary);border-color:var(--color-border-hover)}
    .lz-toc-fab svg{width:20px;height:20px}
    .lz-toc-mask{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9997;opacity:0;pointer-events:none;transition:opacity .25s}
    .lz-toc-mask.open{opacity:1;pointer-events:auto}
    .lz-toc-panel{position:fixed;top:0;right:0;bottom:0;width:300px;max-width:85vw;z-index:9999;background:var(--color-surface);border-left:1px solid var(--color-border);transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;padding:56px 0 24px;box-shadow:-8px 0 32px rgba(0,0,0,.3)}
    .lz-toc-panel.open{transform:translateX(0)}
    .lz-toc-title{position:absolute;top:18px;left:24px;font-family:var(--font-title);font-size:13px;font-weight:700;color:var(--color-text-muted);letter-spacing:.12em;text-transform:uppercase}
    .lz-toc-close{position:absolute;top:14px;right:16px;width:30px;height:30px;border-radius:6px;border:none;background:transparent;color:var(--color-text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
    .lz-toc-close:hover{background:var(--color-surface-elevated);color:var(--color-text-primary)}
    .lz-toc-close svg{width:16px;height:16px}
    .lz-toc-item{display:block;width:100%;text-align:left;padding:8px 24px;font-family:var(--font-body);font-size:14px;line-height:1.5;color:var(--color-text-secondary);background:none;border:none;border-left:2px solid transparent;cursor:pointer;transition:color .15s,background .15s}
    .lz-toc-item:hover{color:var(--color-text-primary);background:var(--color-surface-elevated)}
    .lz-toc-item.active{color:var(--color-primary);border-left-color:var(--color-primary);font-weight:600;background:var(--color-surface-elevated)}
    .lz-toc-item.lvl-3{padding-left:40px;font-size:13px}
    .daily-container h2,.daily-container h3{scroll-margin-top:24px}
  </style>
  <script>
  (function () {
    var mask, panel, list, fab;
    function collectHeadings() {
      var counter = {}; var headings = [];
      document.querySelectorAll('.daily-container').forEach(function (c) {
        c.querySelectorAll('h2, h3').forEach(function (el) {
          if (!el.id) {
            var text = (el.textContent || '').trim();
            var base = 'h-' + text.toLowerCase().replace(/[^a-z0-9一-鿿]+/g, '-').replace(/^-+|-+$/g, '') || 'h-untitled';
            var n = counter[base] || 0; counter[base] = n + 1;
            el.id = n === 0 ? base : base + '-' + n;
          }
          headings.push({ id: el.id, text: (el.textContent || '').trim(), level: parseInt(el.tagName.charAt(1), 10) });
        });
      });
      return headings;
    }
    function ensureDom() {
      if (fab) return;
      mask = document.createElement('div'); mask.className = 'lz-toc-mask'; document.body.appendChild(mask);
      panel = document.createElement('nav'); panel.className = 'lz-toc-panel'; panel.setAttribute('aria-label', '目录');
      panel.innerHTML = '<div class="lz-toc-title">目录</div><button class="lz-toc-close" aria-label="关闭目录"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>';
      list = document.createElement('div'); panel.appendChild(list); document.body.appendChild(panel);
      fab = document.createElement('button'); fab.className = 'lz-toc-fab'; fab.setAttribute('aria-label', '打开目录');
      fab.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h12"/></svg>';
      document.body.appendChild(fab);
      fab.addEventListener('click', open);
      panel.querySelector('.lz-toc-close').addEventListener('click', close);
      mask.addEventListener('click', close);
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
    }
    function open() { panel.classList.add('open'); mask.classList.add('open'); }
    function close() { panel.classList.remove('open'); mask.classList.remove('open'); }
    var io = null;
    function observe() {
      if (io) io.disconnect();
      if (!('IntersectionObserver' in window)) return;
      var items = list.querySelectorAll('.lz-toc-item');
      io = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) {
          if (en.isIntersecting) {
            var id = en.target.id;
            items.forEach(function (it) { it.classList.toggle('active', it.dataset.target === id); });
          }
        });
      }, { root: null, rootMargin: '0px 0px -70% 0px', threshold: 0 });
      document.querySelectorAll('.daily-container h2,.daily-container h3').forEach(function (el) { io.observe(el); });
    }
    function render() {
      ensureDom();
      var headings = collectHeadings();
      list.innerHTML = '';
      if (headings.length === 0) { fab.style.display = 'none'; return; }
      fab.style.display = 'flex';
      headings.forEach(function (h) {
        var btn = document.createElement('button');
        btn.className = 'lz-toc-item' + (h.level === 3 ? ' lvl-3' : '');
        btn.textContent = h.text; btn.dataset.target = h.id;
        btn.addEventListener('click', function () {
          var target = document.getElementById(h.id);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          close();
        });
        list.appendChild(btn);
      });
      observe();
    }
    var renderTimer = null;
    function schedRender() { if (renderTimer) return; renderTimer = setTimeout(function () { renderTimer = null; render(); }, 200); }
    new MutationObserver(schedRender).observe(document.documentElement, { childList: true, subtree: true });
    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', function () { setTimeout(render, 150); }); } else { setTimeout(render, 150); }
    window.addEventListener('load', function () { setTimeout(render, 300); });
  })();
  </script>
