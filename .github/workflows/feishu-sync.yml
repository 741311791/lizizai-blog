name: 飞书博客同步

on:
  # 每日北京时间 09:00（UTC 01:00）
  schedule:
    - cron: '0 1 * * *'

  # 手动触发
  workflow_dispatch:
    inputs:
      force_sync:
        description: '强制全量同步'
        required: false
        default: 'false'
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    # 同步全量文档耗时随内容增长逼近上限；public 仓库 Actions 分钟数无限制
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # 与本地 pnpm 11 对齐：根目录 pnpm-workspace.yaml 使用 pnpm 10+ 的 allowBuilds 字段，
          # pnpm 9 的 store path 会因缺少 packages 字段报错
          version: 11

      - uses: actions/setup-node@v4
        with:
          # pnpm 11 要求 Node.js >= 22.13
          node-version: 22
          cache: pnpm
          cache-dependency-path: workers/feishu-blog-sync/pnpm-lock.yaml

      - name: 安装依赖
        # worker 有独立的 pnpm-workspace.yaml（allowBuilds 授权 esbuild/sharp 构建脚本），pnpm
        # 会以 worker 为 workspace 根，不被根目录带偏。禁用 --ignore-workspace：它会跳过
        # allowBuilds 配置，导致 ERR_PNPM_IGNORED_BUILDS（pnpm v11 strictDepBuilds 默认 true）
        run: pnpm install
        working-directory: workers/feishu-blog-sync

      - name: 执行同步
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: lizizai-blog
          R2_BASE_PATH: blog-data
          R2_PUBLIC_URL: https://pub-7fc5ed7acc9844ab99297fa6b47f55e6.r2.dev
        run: npx tsx src/cli.ts ${{ inputs.force_sync == 'true' && '--force' || '' }}
        working-directory: workers/feishu-blog-sync

      - name: 刷新前端缓存（ISR 按需 revalidate）
        # 同步成功后通知 Vercel 清除 ISR 与数据缓存，新文章秒级可见；
        # 失败不阻塞：缓存最终会在 ISR revalidate 周期内自然过期
        if: success()
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$ADMIN_PASSWORD" ]; then
            echo "::warning::未配置 SITE_URL / ADMIN_PASSWORD，跳过缓存刷新"
            exit 0
          fi
          curl -sS -X POST \
            -H "Authorization: Bearer ${ADMIN_PASSWORD}" \
            --max-time 30 \
            "${SITE_URL}/api/revalidate" || \
            echo "::warning::缓存刷新请求失败，ISR 将在 revalidate 周期内自然更新"

      - name: 同步结果通知（失败时）
        if: failure()
        run: |
          echo "::error::飞书博客同步失败，请检查日志"
